version: '3.8'

services:
  # 应用服务（不包含数据库）
  app:
    build: .
    container_name: it-ticket-system
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-ticket_user}
      - DB_PASSWORD=${DB_PASSWORD:-change_this_password}
      - DB_NAME=${DB_NAME:-it_ticket_system}
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-very-long-random-secret-key}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - ticket-network

  # Nginx反向代理（可选）
  # 如果宿主机80端口被占用，可以注释掉Nginx服务，直接访问8000端口
  # nginx:
  #   image: nginx:alpine
  #   container_name: it-ticket-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   restart: unless-stopped
  #   networks:
  #     - ticket-network

networks:
  ticket-network:
    driver: bridge
