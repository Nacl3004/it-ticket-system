<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - IT运维工单系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
        }
        
        .btn-hover {
            transition: all 0.3s ease;
        }
        
        .btn-hover:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-xl border-b-2 border-indigo-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-18">
                <div class="flex items-center">
                    <a href="/static/dashboard.html" class="flex items-center space-x-4 group">
                        <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 rounded-2xl flex items-center justify-center shadow-lg group-hover:rotate-6 transition">
                            <i class="fas fa-tools text-2xl text-white"></i>
                        </div>
                        <div>
                            <span class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">IT运维工单系统</span>
                            <p class="text-xs text-gray-500 font-medium">User Management</p>
                        </div>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/static/dashboard.html" class="text-gray-600 hover:text-indigo-600 transition-all font-bold px-5 py-2.5 rounded-xl hover:bg-indigo-50">
                        <i class="fas fa-arrow-left mr-2"></i>返回控制台
                    </a>
                    <div class="flex items-center space-x-3 pl-4 border-l-2 border-gray-200">
                        <div class="text-right">
                            <p class="text-sm font-bold text-gray-900" id="userName"></p>
                            <p class="text-xs text-indigo-600 font-medium" id="userRole"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="bg-white rounded-2xl shadow-xl p-8 border-2 border-gray-100 card-hover">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-black text-gray-900 flex items-center">
                        <i class="fas fa-users mr-3 text-indigo-600"></i>用户管理
                    </h2>
                    <p class="text-sm text-gray-600 mt-2 font-medium">管理系统用户和权限</p>
                </div>
                <div class="flex space-x-4">
                    <button onclick="showImportModal()" class="btn-hover bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 text-white px-7 py-3.5 rounded-xl transition font-bold shadow-lg">
                        <i class="fas fa-file-excel mr-2"></i>批量导入
                    </button>
                    <button onclick="showCreateUserModal()" class="btn-hover bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white px-7 py-3.5 rounded-xl transition font-bold shadow-lg">
                        <i class="fas fa-user-plus mr-2"></i>创建用户
                    </button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gradient-to-r from-gray-50 to-gray-100 border-b-2 border-gray-200">
                        <tr>
                            <th class="px-6 py-5 text-left text-xs font-black text-gray-700 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-5 text-left text-xs font-black text-gray-700 uppercase tracking-wider">用户名</th>
                            <th class="px-6 py-5 text-left text-xs font-black text-gray-700 uppercase tracking-wider">真实姓名</th>
                            <th class="px-6 py-5 text-left text-xs font-black text-gray-700 uppercase tracking-wider">邮箱</th>
                            <th class="px-6 py-5 text-left text-xs font-black text-gray-700 uppercase tracking-wider">电话</th>
                            <th class="px-6 py-5 text-left text-xs font-black text-gray-700 uppercase tracking-wider">角色</th>
                            <th class="px-6 py-5 text-left text-xs font-black text-gray-700 uppercase tracking-wider">部门</th>
                            <th class="px-6 py-5 text-left text-xs font-black text-gray-700 uppercase tracking-wider">状态</th>
                            <th class="px-6 py-5 text-left text-xs font-black text-gray-700 uppercase tracking-wider">创建人</th>
                            <th class="px-6 py-5 text-left text-xs font-black text-gray-700 uppercase tracking-wider">创建时间</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="bg-white divide-y-2 divide-gray-100">
                        <!-- 用户列表将在这里动态加载 -->
                    </tbody>
                </table>
            </div>
            <div id="userPagination" class="pt-6 border-t border-gray-100 mt-4"></div>
        </div>
    </div>

    <!-- 创建用户模态框 -->
    <div id="createUserModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">
                    <i class="fas fa-user-plus mr-2 text-indigo-600"></i>创建用户
                </h2>
                <button onclick="closeCreateUserModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <form id="createUserForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">用户名 *</label>
                        <input type="text" id="username" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="请输入用户名">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">密码 *</label>
                        <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="请输入密码">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">真实姓名 *</label>
                        <input type="text" id="realName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="请输入真实姓名">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">邮箱</label>
                        <input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="请输入邮箱">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">电话</label>
                        <input type="tel" id="phone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="请输入电话">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">角色 *</label>
                        <select id="roleId" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            <option value="">请选择角色</option>
                        </select>
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">部门</label>
                        <input type="text" id="department" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="请输入部门">
                    </div>
                </div>

                <div class="flex space-x-4 mt-6">
                    <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg transition">
                        <i class="fas fa-save mr-2"></i>创建用户
                    </button>
                    <button type="button" onclick="closeCreateUserModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-3 rounded-lg transition">
                        <i class="fas fa-times mr-2"></i>取消
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Excel批量导入模态框 -->
    <div id="importModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">
                    <i class="fas fa-file-excel mr-2 text-green-600"></i>批量导入用户
                </h2>
                <button onclick="closeImportModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                    <h3 class="font-semibold text-blue-800 mb-2">
                        <i class="fas fa-info-circle mr-2"></i>Excel文件格式说明
                    </h3>
                    <p class="text-sm text-blue-700 mb-2">请按照以下格式准备Excel文件（第一行为表头）：</p>
                    <table class="w-full text-sm text-blue-700 border border-blue-300">
                        <thead class="bg-blue-100">
                            <tr>
                                <th class="border border-blue-300 px-2 py-1">用户名</th>
                                <th class="border border-blue-300 px-2 py-1">密码</th>
                                <th class="border border-blue-300 px-2 py-1">真实姓名</th>
                                <th class="border border-blue-300 px-2 py-1">邮箱</th>
                                <th class="border border-blue-300 px-2 py-1">电话</th>
                                <th class="border border-blue-300 px-2 py-1">角色</th>
                                <th class="border border-blue-300 px-2 py-1">部门</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="border border-blue-300 px-2 py-1">zhangsan</td>
                                <td class="border border-blue-300 px-2 py-1">123456</td>
                                <td class="border border-blue-300 px-2 py-1">张三</td>
                                <td class="border border-blue-300 px-2 py-1">zhangsan@example.com</td>
                                <td class="border border-blue-300 px-2 py-1">13800138000</td>
                                <td class="border border-blue-300 px-2 py-1">普通用户</td>
                                <td class="border border-blue-300 px-2 py-1">技术部</td>
                            </tr>
                        </tbody>
                    </table>
                    <p class="text-xs text-blue-600 mt-2">注意：角色名称必须与系统中的角色名称完全一致</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">选择Excel文件</label>
                    <input type="file" id="excelFile" accept=".xlsx,.xls" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                </div>

                <div id="importResult" class="hidden">
                    <!-- 导入结果将显示在这里 -->
                </div>

                <div class="flex space-x-4">
                    <button onclick="importUsers()" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg transition">
                        <i class="fas fa-upload mr-2"></i>开始导入
                    </button>
                    <button onclick="closeImportModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-3 rounded-lg transition">
                        <i class="fas fa-times mr-2"></i>取消
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/watermark.js?v=202606042150"></script>
    <script src="/static/pagination.js?v=20260610"></script>
    <script>
        let token = null;
        let currentUser = null;
        let allUsers = [];
        const userPagination = createClientPagination({
            containerId: 'userPagination',
            pageSize: 10,
            onPageChange: () => renderUsers(allUsers, false)
        });

        document.addEventListener('DOMContentLoaded', async () => {
            token = sessionStorage.getItem('token');
            
            if (!token) {
                window.location.href = '/static/index.html';
                return;
            }
            
            // 从后端验证token并获取最新用户信息
            try {
                const response = await fetch(`/api/current-user?token=${token}`);
                if (!response.ok) {
                    // token无效，清除sessionStorage并跳转到登录页
                    sessionStorage.removeItem('token');
                    sessionStorage.removeItem('user');
                    window.location.href = '/static/index.html';
                    return;
                }
                
                const userData = await response.json();
                currentUser = userData;
                
                // 更新sessionStorage中的用户信息
                sessionStorage.setItem('user', JSON.stringify(currentUser));
                
            } catch (error) {
                console.error('获取用户信息失败:', error);
                sessionStorage.removeItem('token');
                sessionStorage.removeItem('user');
                window.location.href = '/static/index.html';
                return;
            }
            
            // 检查权限
            if (!['super_admin', 'admin', 'hr', 'it'].includes(currentUser.role_type)) {
                alert('您没有权限访问此页面');
                window.location.href = '/static/dashboard.html';
                return;
            }
            
            document.getElementById('userName').textContent = currentUser.real_name;
            document.getElementById('userRole').textContent = currentUser.role_name;
            
            await loadRoles();
            await loadUsers();
            
            document.getElementById('createUserForm').addEventListener('submit', createUser);
        });

        async function loadRoles() {
            try {
                const response = await fetch(`/api/roles?token=${token}`);
                const data = await response.json();
                
                const select = document.getElementById('roleId');
                select.innerHTML = '<option value="">请选择角色</option>';
                
                data.roles.forEach(role => {
                    const option = document.createElement('option');
                    option.value = role.id;
                    option.textContent = role.role_name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('加载角色失败:', error);
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch(`/api/users?token=${token}`);
                const data = await response.json();
                
                allUsers = data.users;
                renderUsers(allUsers);
            } catch (error) {
                console.error('加载用户列表失败:', error);
            }
        }

        function renderUsers(users, resetPage = true) {
            const tbody = document.getElementById('userTableBody');
            allUsers = users;
            userPagination.setTotal(users.length, resetPage);
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="px-6 py-4 text-center text-gray-500">暂无用户</td></tr>';
                return;
            }
            
            tbody.innerHTML = userPagination.slice(users).map(user => {
                const statusBadge = user.status === 'active' 
                    ? '<span class="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">正常</span>'
                    : '<span class="px-2 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800">禁用</span>';
                
                return `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.id}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-indigo-600">${user.username}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.real_name}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${user.email || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${user.phone || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            <span class="px-2 py-1 text-xs font-semibold rounded-full bg-indigo-100 text-indigo-800">${user.role_name}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${user.department || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap">${statusBadge}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${user.creator_name || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${formatDateTime(user.created_at)}</td>
                    </tr>
                `;
            }).join('');
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(String(dateStr).replace('T', ' ').replace(/-/g, '/'));
            return date.toLocaleString('zh-CN', {
                timeZone: 'Asia/Shanghai',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
        }

        function showCreateUserModal() {
            document.getElementById('createUserModal').classList.remove('hidden');
        }

        function closeCreateUserModal() {
            document.getElementById('createUserModal').classList.add('hidden');
            document.getElementById('createUserForm').reset();
        }

        function showImportModal() {
            document.getElementById('importModal').classList.remove('hidden');
            document.getElementById('importResult').classList.add('hidden');
            document.getElementById('excelFile').value = '';
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.add('hidden');
        }

        async function importUsers() {
            const fileInput = document.getElementById('excelFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('请选择Excel文件');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch(`/api/users/import?token=${token}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                const resultDiv = document.getElementById('importResult');
                resultDiv.classList.remove('hidden');
                
                if (response.ok) {
                    let resultHTML = `
                        <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                            <h3 class="font-semibold text-green-800 mb-2">
                                <i class="fas fa-check-circle mr-2"></i>导入完成
                            </h3>
                            <p class="text-sm text-green-700">成功导入 ${data.success_count} 条记录</p>
                    `;
                    
                    if (data.error_count > 0) {
                        resultHTML += `
                            <p class="text-sm text-red-700 mt-2">失败 ${data.error_count} 条记录：</p>
                            <ul class="text-xs text-red-600 mt-1 max-h-40 overflow-y-auto">
                                ${data.errors.map(err => `<li>• ${err}</li>`).join('')}
                            </ul>
                        `;
                    }
                    
                    resultHTML += '</div>';
                    resultDiv.innerHTML = resultHTML;
                    
                    // 刷新用户列表
                    loadUsers();
                } else {
                    resultDiv.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <h3 class="font-semibold text-red-800 mb-2">
                                <i class="fas fa-exclamation-circle mr-2"></i>导入失败
                            </h3>
                            <p class="text-sm text-red-700">${data.detail || '导入失败'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('导入用户失败:', error);
                const resultDiv = document.getElementById('importResult');
                resultDiv.classList.remove('hidden');
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <h3 class="font-semibold text-red-800 mb-2">
                            <i class="fas fa-exclamation-circle mr-2"></i>网络错误
                        </h3>
                        <p class="text-sm text-red-700">请稍后重试</p>
                    </div>
                `;
            }
        }

        async function createUser(e) {
            e.preventDefault();
            
            const userData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                real_name: document.getElementById('realName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                role_id: parseInt(document.getElementById('roleId').value),
                department: document.getElementById('department').value
            };
            
            try {
                const response = await fetch(`/api/users?token=${token}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('用户创建成功！');
                    closeCreateUserModal();
                    loadUsers();
                } else {
                    alert(data.detail || '创建失败');
                }
            } catch (error) {
                console.error('创建用户失败:', error);
                alert('网络错误，请稍后重试');
            }
        }
    </script>
</body>
</html>
