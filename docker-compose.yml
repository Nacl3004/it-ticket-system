services:
  # 应用服务
  app:
    build: .
    container_name: it-ticket-system
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-ticket_user}
      - DB_PASSWORD=${DB_PASSWORD:-change_this_password}
      - DB_NAME=${DB_NAME:-it_ticket_system}
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-very-long-random-secret-key}
      - DB_TIME_ZONE=${DB_TIME_ZONE:-}
      - TZ=${TZ:-UTC}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ticket-network

  # MySQL数据库服务
  db:
    image: mysql:8.0
    container_name: it-ticket-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${DB_NAME:-it_ticket_system}
      - MYSQL_USER=${DB_USER:-ticket_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-change_this_password}
      - TZ=${TZ:-UTC}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"  # 映射到宿主机的3307端口，避免与宿主机MySQL冲突
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped
    networks:
      - ticket-network

  # Nginx反向代理（可选）
  # 如果宿主机80端口被占用，可以注释掉Nginx服务，直接访问8000端口
  # nginx:
  #   image: nginx:alpine
  #   container_name: it-ticket-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   restart: unless-stopped
  #   networks:
  #     - ticket-network

volumes:
  mysql_data:
    driver: local

networks:
  ticket-network:
    driver: bridge
